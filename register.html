<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
 <link rel="stylesheet" href="styles.css"> 
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.min.js" integrity="sha384-w1Q4orYjBQndcko6MimVbzY0tgp4pWB4lZ7lr30WKz0vr/aWKhXdBNmNb5D92v7s" crossorigin="anonymous"></script>
<script src="register.js" type="text/javascript"></script>

        
</head>
<body class="body">
    <datalist id="country">
        <option value="Egypt">
        <option value="USA">
        <option value="England">
        <option value="France">
        <option value="Italy">
    </datalist>
<header>
    <div>
        <nav class="nav nav-pills">
            <a class="nav-link" href="index.html" target="_self">Login</a> &nbsp;&nbsp;&nbsp;&nbsp;
            <a class="nav-link active" href="register.html" target="_self">Register</a> &nbsp;&nbsp;&nbsp;&nbsp;
        </nav>
    </div>
 <h1 class="display-1">Register as a new student</h1>
 <div class="container-fluid">
 <form id="register_form"  method="POST" >
    <div class="form-row">
    <div class="col-auto">
    <input class="form-control" placeholder="Enter your first name" id="fname" type="text"  maxlength="12" > <br>
</div>
<div class="col-auto">
    <input class="form-control" placeholder="Enter your middle name" type="text" id="mname" maxlength="12" ><br>
</div>
<div class="col-auto">
    <input class="form-control" placeholder="Enter your last name" type="text" id="lname" maxlength="12" ><br>
</div>
</div>

<div class="form-row">
<div class="form-group col-auto">
   <p> Country:</p>
     <input class="form-control " type="text" list="country" >
</div>
<div class="form-group col-auto">
   <p> Grade:</p>
     <select class="form-control custom-select " id="grade" name="grade">
        <option value="one">One</option>
        <option value="two">Two</option>
        <option value="three">Three</option>
        <option value="four">Four</option>
        <option value="five">Five</option>
        <option value="six">Six</option>
    </select>
    </div>
</div>
    <div class="form-row">
    <div class="form-check form-check-inline col-auto">
       <p>Gender: </p>
        <label><input class="form-check-input" type="radio" name="gender" value="male" checked>Male</label>
        <label><input class="form-check-input" type="radio" name="gender" value="female" >Female</label>
    </div>
    <div class="form-check form-check-inline col-auto">
    <p>Choose your lessons:  </p>
    <input id="arabic" class="form-check-input" type="checkbox" value="arabic" checked><label class="form-check-label" for="arabic">Arabic</label>
    <input id="english" class="form-check-input" type="checkbox" value="english" ><label class="form-check-label" for="english">English</label>
    <input id="math" class="form-check-input" type="checkbox" value="math" ><label class="form-check-label" for="math">Math</label>
</div>
</div>

<div class="form-row">
<div class="col-auto">
    <input class="form-control" placeholder="Enter your e-mail address" id="mail" type="email"  required><br>
</div>
<div class="col-auto">
    <input class="form-control" placeholder="Enter your password" id="pass" type="password"  required><br>
</div>
</div>
<div class="form-group">
    <label>Upload your photo <input class="form-control-file"  type="file" ></label>
</div>
<div class="form-group">
    <input class="btn btn-primary" type="submit" value="Submit">
    <input class="btn btn-danger" type="reset" value="Reset">
</div>
 </form>
 <button id="test">test</button>
</div>
 

</header>
</body>
</html>
