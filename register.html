<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link rel="stylesheet" href="styles.css">
<script src="jquery-3.5.1.min.js" ></script>
<script src="register.js" type="text/javascript"></script>

        
</head>
<body class="body">
    <datalist id="country">
        <option value="Egypt">
        <option value="USA">
        <option value="England">
        <option value="France">
        <option value="Italy">
    </datalist>
<header>
    <div>
        <nav >
            <a class="nav" href="index.html" target="_self">Login</a> &nbsp;&nbsp;&nbsp;&nbsp;
            <a class="nav" href="register.html" target="_self">Register</a> &nbsp;&nbsp;&nbsp;&nbsp;
        </nav>
    </div>
 <h1>Register as a new student</h1>
 <form id="register_form"  method="POST" >
    <input type="text" placeholder="enter your first name" maxlength="12" > <br>
    <input type="text" placeholder="enter your middle name" maxlength="12" ><br>
    <input type="text" placeholder="enter your last name" maxlength="12" ><br>
    Gender: <label><input type="radio" name="gender" value="male" checked>Male</label>
    <label><input type="radio" name="gender" value="female" >Female</label><br>
    Country: <input type="text" list="country" ><br>
    Grade: <select name="grade">
        <option value="one">One</option>
        <option value="two">Two</option>
        <option value="three">Three</option>
        <option value="four">Four</option>
        <option value="five">Five</option>
        <option value="six">Six</option></select><br>
    Choose your lessons: <label><input type="checkbox" value="arabic" checked>Arabic</label>
    <label><input type="checkbox" value="english" >English</label>
    <label><input type="checkbox" value="math" >Math</label><br>
    <input id="mail" type="email" placeholder="enter your email" required><br>
    <input id="pass" type="password" placeholder="enter your password" required><br>
    <label>Upload your photo <input type="file" ></label><br>
    <input type="submit" value="submit">
    <input type="reset" value="reset">
 </form>
 

</header>
</body>
</html>
